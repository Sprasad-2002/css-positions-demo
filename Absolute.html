<!DOCTYPE html>
<html lang="en">
<head>
    <title>Absolute</title>
    <style>
        #GrandParent {
          width: 400px;
           height: 200px;
          border: 3px solid green;
          background-color: lawngreen;
          text-align: center;
} 
        #Parent {
          position: relative;
          width: 300px;
          height: 150px;
          border: 3px solid blue;
          background-color: indigo;
          text-align: center;
        }
        #child {
         
          top: 100px;
          left: 50px;
          width: 200px;
          height: 100px;
          border: 3px solid red;
          background-color: olive;
          text-align: center;
          position: absolute;
          color: thistle;
          font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="GrandParent"> 
        <div id="Parent">
                  <div id="child">
                        <p>Absolute</p>
                     </div>
        </div>
    </div> 

</body>
</html>
