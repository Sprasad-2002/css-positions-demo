<!DOCTYPE html>
<html lang="en">
<head>
    <title>Relative</title>
    <style>
        div{
            background-color: blue;
            color: white;
            width: 200px;
            padding: 10px;
            text-align: center;
        }

        #Static{
            position: static;
            top: 100px;
            right: 200px;
        }
         #Relative{
            background-color: yellow;
            position: relative;
            left: 30px;
            color: black;
        }
    </style>
</head>
<body>
    <div id="Static">
        <p>Static Position</p>
    </div>
    <div id="Relative">
        <p> Relative Position</p>
    </div>
</body>
</html>
